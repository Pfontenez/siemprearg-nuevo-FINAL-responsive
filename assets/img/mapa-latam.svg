<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3a7f"/>
      <stop offset="60%" stop-color="#1554a5"/>
      <stop offset="100%" stop-color="#1d70b7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.55">
      <stop offset="0%" stop-color="#51C0ED" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#51C0ED" stop-opacity="0"/>
    </radialGradient>
    <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" in="SourceAlpha"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Pin reutilizable -->
    <symbol id="pin" viewBox="-30 -42 60 60">
      <path d="M 0 -42 C 16.5 -42 27 -32 27 -16 C 27 0 0 18 0 18 C 0 18 -27 0 -27 -16 C -27 -32 -16.5 -42 0 -42 Z" fill="#fff"/>
      <circle cx="0" cy="-16" r="17" fill="#fff"/>
    </symbol>
  </defs>

  <!-- Fondo azul --><rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>

  <!-- Conexión punteada México → Chile/Argentina -->
  <path d="M 760 215 Q 720 480 660 720 Q 700 720 740 740"
        stroke="rgba(255,255,255,0.32)" stroke-width="2"
        stroke-dasharray="6 9" fill="none" stroke-linecap="round"/>


  <!-- ===== PIN MÉXICO ===== -->
  <g transform="translate(720,200)" filter="url(#pinShadow)">
    <use href="#pin"/>
    <!-- Bandera México: verde / blanco / rojo -->
    <g transform="translate(-12,-25)">
      <rect width="8" height="18" fill="#006847"/>
      <rect x="8" width="8" height="18" fill="#fff"/>
      <rect x="16" width="8" height="18" fill="#ce1126"/>
    </g>
  </g>

  <!-- ===== PIN CHILE ===== -->
  <g transform="translate(610,830)" filter="url(#pinShadow)">
    <use href="#pin"/>
    <g transform="translate(-12,-25)">
      <rect width="9" height="9" fill="#0033A0"/>
      <rect x="9" width="15" height="9" fill="#fff"/>
      <rect y="9" width="24" height="9" fill="#D52B1E"/>
      <polygon points="4.5,1.5 5.4,4.4 8.4,4.4 6,6.2 6.9,9.1 4.5,7.4 2.1,9.1 3,6.2 0.6,4.4 3.6,4.4" fill="#fff"/>
    </g>
  </g>

  <!-- ===== PIN ARGENTINA ===== -->
  <g transform="translate(660,820)" filter="url(#pinShadow)">
    <use href="#pin"/>
    <g transform="translate(-12,-25)">
      <rect width="24" height="6" fill="#74ACDF"/>
      <rect y="6" width="24" height="6" fill="#fff"/>
